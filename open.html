<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TubeTune — Opening...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07080f;color:#f0f0ff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .logo{width:72px;height:72px;background:linear-gradient(135deg,#7c5cfc,#f472b6);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(124,92,252,.4)}
  h1{font-size:22px;font-weight:800;margin-bottom:8px}
  p{font-size:14px;color:#8888aa;line-height:1.6;margin-bottom:32px;max-width:280px}
  .spinner{width:36px;height:36px;border:3px solid rgba(124,92,252,.2);border-top-color:#7c5cfc;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:linear-gradient(135deg,#7c5cfc,#5b21b6);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 8px 32px rgba(124,92,252,.45);transition:all .2s;margin:6px}
  .btn:active{transform:scale(.97)}
  .btn.outline{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);box-shadow:none;font-size:14px;padding:12px 24px}
  .status{font-size:13px;color:#8888aa;margin-top:16px}
  #waitMsg{display:block}
  #failMsg{display:none}
</style>
</head>
<body>

<div class="logo">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>
</div>

<h1>TubeTune</h1>
<p id="waitMsg">App khol raha hai...<br>Ek second ruko 🎵</p>
<p id="failMsg" style="display:none">App installed nahi hai.<br>Pehle download karo, phir link se song seedha play hoga!</p>

<div class="spinner" id="spinner"></div>

<div id="btnArea" style="display:none;flex-direction:column;align-items:center">
  <a href="https://tubetune.free.nf/" class="btn" id="downloadBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85a.637.637 0 0 0-.83.22l-1.88 3.24a11.463 11.463 0 0 0-8.94 0L5.65 5.67a.643.643 0 0 0-.87-.2c-.28.18-.37.54-.22.83L6.4 9.48A10.78 10.78 0 0 0 1 18h22a10.78 10.78 0 0 0-5.4-8.52zM7 15.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm10 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"/>
    </svg>
    App Download Karo
  </a>
  <a href="https://tubetune.free.nf/" class="btn outline">
    Browser mein kholo
  </a>
</div>

<div class="status" id="statusTxt"></div>

<script>
  // URL se song ID nikalo
  const params = new URLSearchParams(window.location.search);
  const songId = params.get('song') || '';

  // Custom scheme URL — app installed hone par seedha khulega
  const appUrl = 'tubetune://song/' + encodeURIComponent(songId);
  // Fallback — website with song param
  const webUrl = 'https://tubetune.free.nf/?song=' + encodeURIComponent(songId);

  function showFallback() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('waitMsg').style.display = 'none';
    document.getElementById('failMsg').style.display = 'block';
    document.getElementById('btnArea').style.display = 'flex';
    // Download button pe web URL add karo as fallback
    document.getElementById('downloadBtn').href = 'https://tubetune.free.nf/';
  }

  function tryOpenApp() {
    // Step 1: Custom scheme se app open karo
    document.getElementById('statusTxt').textContent = 'App dhundh raha hai...';
    
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    // Visibility change detect karo — app khula toh page background mein jaayega
    let appOpened = false;
    const visHandler = () => {
      if (document.hidden) {
        appOpened = true;
      }
    };
    document.addEventListener('visibilitychange', visHandler);

    // Custom scheme trigger karo
    window.location.href = appUrl;

    // 2.5 sec baad check karo — agar page abhi bhi visible hai = app nahi khula
    setTimeout(() => {
      document.removeEventListener('visibilitychange', visHandler);
      if (!appOpened && !document.hidden) {
        // App installed nahi — fallback dikhao
        showFallback();
      } else {
        // App khul gaya — is page ki zaroorat nahi
        document.getElementById('statusTxt').textContent = 'App mein khul raha hai ✅';
      }
    }, 2500);
  }

  // Page load hone par try karo
  window.addEventListener('load', () => {
    if (songId) {
      tryOpenApp();
    } else {
      // Song ID nahi hai — seedha website pe bhejo
      window.location.replace('https://tubetune.free.nf/');
    }
  });
</script>
</body>
</html>
